name: Periodic Hello

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check deployed application
        uses: jtalk/url-health-check-action@v5
        with:
          url: https://fullstackopen-cicd-njjg.onrender.com/
          max-attempts: 3
          retry-delay: 5s